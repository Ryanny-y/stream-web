name: "viewix"

services:
  postgres:
    image: postgres:16
    container_name: viewix
    restart: always
    environment:
      POSTGRES_DB: viewix_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5436:5432"
    volumes:
      - postgres_data_viewix:/var/lib/postgresql/data


  adminer:
    image: adminer
    container_name: viewix_adminer
    restart: always
    ports:
      - "8081:8080"
    depends_on:
      - postgres

volumes:
  postgres_data_viewix: