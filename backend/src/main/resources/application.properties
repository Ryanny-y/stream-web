server.port=8080
spring.application.name=backend

# ============================== jdbc ==============================================
spring.datasource.url=jdbc:postgresql://localhost:5436/viewix_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================== FLYWAY ==============================================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ============================== JPA ==============================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate

# ============================== FILE ==============================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB
spring.servlet.multipart.file-size-threshold=2MB

# ============================== jwt ==============================================
jwt.secretKey=7f9c2d8a4b6e1c93f5a8d2b7e4c1a9f6d3e8b0c5f2a7d1e9c4b6a8f3d2e1c7a9
jwt.accessTokenExp=18000000

# ============================== seed data ==============================================
app.seed.default-admin.enabled=true
app.seed.default-admin.username=${DEFAULT_ADMIN_USERNAME:admin}
app.seed.default-admin.email=${DEFAULT_ADMIN_EMAIL:admin@viewix.local}
app.seed.default-admin.password=${DEFAULT_ADMIN_PASSWORD:Admin@12345}
